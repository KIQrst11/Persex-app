<script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
    overflow:hidden;
}

.bg{
    position:absolute;
    width:100%;
    height:100%;
    backdrop-filter:blur(10px);
}

.card{
    position:relative;
    z-index:2;
    text-align:center;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:24px;
    padding:40px;
    width:90%;
    max-width:420px;
    color:white;
    backdrop-filter:blur(20px);
}

.logo{
    width:100px;
    height:100px;
    border-radius:24px;
    margin:auto;
    margin-bottom:20px;
    object-fit:cover;
    box-shadow:0 0 25px rgba(255,255,255,.3);
}

h1{
    font-size:28px;
    margin-bottom:10px;
}

p{
    opacity:.8;
    margin-bottom:25px;
}

.loader{
    width:48px;
    height:48px;
    border:4px solid rgba(255,255,255,.3);
    border-top:4px solid white;
    border-radius:50%;
    margin:auto;
    animation:spin 1s linear infinite;
}

.download{
    display:inline-block;
    margin-top:25px;
    color:white;
    text-decoration:none;
    background:#2563eb;
    padding:12px 24px;
    border-radius:12px;
    transition:.3s;
}

.download:hover{
    background:#1d4ed8;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}
</style>
</head>
